<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <g stroke="#c0392b" fill="#c0392b" opacity="0.12" stroke-width="1" stroke-linecap="butt">
    <!-- Horizontal traces -->
    <line x1="0" y1="40" x2="200" y2="40"/>
    <line x1="0" y1="80" x2="160" y2="80"/>
    <line x1="40" y1="120" x2="200" y2="120"/>
    <line x1="0" y1="160" x2="100" y2="160"/>
    <!-- Vertical traces -->
    <line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="100" y1="40" x2="100" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="120"/>
    <line x1="20" y1="80" x2="20" y2="160"/>
    <!-- Junction dots at intersections -->
    <circle cx="40" cy="40" r="2.5" stroke="none"/>
    <circle cx="100" cy="40" r="2.5" stroke="none"/>
    <circle cx="160" cy="40" r="2.5" stroke="none"/>
    <circle cx="40" cy="80" r="2.5" stroke="none"/>
    <circle cx="100" cy="80" r="2.5" stroke="none"/>
    <circle cx="160" cy="80" r="2.5" stroke="none"/>
    <circle cx="20" cy="80" r="2.5" stroke="none"/>
    <circle cx="40" cy="120" r="2.5" stroke="none"/>
    <circle cx="100" cy="120" r="2.5" stroke="none"/>
    <circle cx="160" cy="120" r="2.5" stroke="none"/>
    <circle cx="20" cy="160" r="2.5" stroke="none"/>
    <circle cx="40" cy="160" r="2.5" stroke="none"/>
    <circle cx="100" cy="160" r="2.5" stroke="none"/>
    <!-- Endpoint pads at tile edges -->
    <rect x="38" y="-2" width="4.5" height="4.5" rx="1" stroke="none"/>
    <rect x="98" y="-2" width="4.5" height="4.5" rx="1" stroke="none"/>
    <rect x="158" y="-2" width="4.5" height="4.5" rx="1" stroke="none"/>
    <rect x="-2" y="38" width="4.5" height="4.5" rx="1" stroke="none"/>
    <rect x="-2" y="78" width="4.5" height="4.5" rx="1" stroke="none"/>
    <rect x="-2" y="158" width="4.5" height="4.5" rx="1" stroke="none"/>
    <rect x="38" y="197" width="4.5" height="4.5" rx="1" stroke="none"/>
    <rect x="98" y="197" width="4.5" height="4.5" rx="1" stroke="none"/>
    <rect x="197" y="118" width="4.5" height="4.5" rx="1" stroke="none"/>
  </g>
</svg>
